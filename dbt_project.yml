name: "my_first_project"
version: "1.0.0"
config-version: 2

profile: "default"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

seeds:
  my_first_project:
    +schema: raw

models:
  my_first_project:
    staging:
      +materialized: view
      +schema: staging

    marts:
      +materialized: table
      +schema: marts
